name: Build, Push & Deploy

on:
  push:
    branches: [ staging, production ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push-ghcr:
    uses: LeidenUniversityLibrary/container-deploy-awx-action/.github/workflows/build-push-ghcr.yml@main
    secrets: inherit
    with:
      production_branch: production
      containerfile: Dockerfile

  generate-quadlets:
    name: Generate Quadlets
    runs-on: ubuntu-latest
    needs: build-push-ghcr
    outputs:
      quadlets_b64: ${{ steps.package_quadlets.outputs.quadlets_b64 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Ensure helper scripts are executable
        run: |
          chmod +x quadlets/generate_quadlets.py || true

      - name: Generate quadlets from docker-compose
        id: gen
        env:
          IMAGE: ${{ needs.build-push-ghcr.outputs.image }}
          TAG: ${{ needs.build-push-ghcr.outputs.branch_tag }}
        run: |
          set -euo pipefail
          mkdir -p quadlets_output

          if [ -f ./quadlets/generate_quadlets.py ]; then
            # Determine tag: staging for staging branch, latest for production
            QUADLET_TAG="latest"
            if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
              QUADLET_TAG="staging"
            fi

            # Generate quadlets with the built image
            python3 ./quadlets/generate_quadlets.py docker-compose.yml \
              --output quadlets_output \
              --user \
              --tag "$QUADLET_TAG" \
              --image-map "pdiiif=$IMAGE:$TAG"
          else
            echo "Error: generator script not found at quadlets/generate_quadlets.py" >&2
            exit 1
          fi
          ls -la quadlets_output || true
      - name: Display generated quadlets
        run: |
          echo "=== Generated Quadlets ==="
          if [ -d quadlets_output ] && [ "$(ls -A quadlets_output)" ]; then
            find quadlets_output -type f -exec echo "--- {} ---" \; -exec cat {} \;
          else
            echo "No quadlets generated"
          fi

      - name: Package quadlets as base64
        id: package_quadlets
        run: |
          set -euo pipefail
          if [ -d quadlets_output ] && [ "$(ls -A quadlets_output)" ]; then
            tar -C quadlets_output -czf quadlets.tar.gz .
            base64 -w0 quadlets.tar.gz > quadlets.b64
            echo "quadlets_b64=$(cat quadlets.b64)" >> "$GITHUB_OUTPUT"
            echo "Packaged quadlets (size: $(wc -c < quadlets.b64) bytes)"
          else
            echo "quadlets_b64=" >> "$GITHUB_OUTPUT"
            echo "No quadlets produced"
          fi


  deploy-awx-podman:
    name: Deploy via AWX (with quadlets)
    needs:
      - build-push-ghcr
      - generate-quadlets
    uses: LeidenUniversityLibrary/container-deploy-awx-action/.github/workflows/deploy-awx-with-quadlets.yml@docker_compose_to_podman
    secrets: inherit
    with:
      image: ${{ needs.build-push-ghcr.outputs.image }}
      image_tag: ${{ needs.build-push-ghcr.outputs.branch_tag }}
      quadlets_archive_b64: ${{ needs.generate-quadlets.outputs.quadlets_b64 }}

